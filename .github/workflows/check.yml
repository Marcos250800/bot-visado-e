name: 🎓 Vigilar Citas Visado Estudios

on:
  schedule:
    # Cada 5 minutos (mínimo real de GitHub Actions ~5 min)
    - cron: "*/5 * * * *"
  workflow_dispatch:  # Permite ejecutarlo manualmente desde la web

permissions:
  contents: write  # Para guardar el archivo de estado

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Ejecutar bot
        env:
          TELEGRAM_BOT_TOKEN_VISADO: ${{ secrets.TELEGRAM_BOT_TOKEN_VISADO }}
          TELEGRAM_CHAT_ID_VISADO: ${{ secrets.TELEGRAM_CHAT_ID_VISADO }}
        run: python monitor_visado.py

      - name: 📸 Subir capturas si las hay
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capturas-${{ github.run_id }}
          path: |
            captura.png
            captura_error.png
            debug_paso3.png
          if-no-files-found: ignore
          retention-days: 3

      - name: 💾 Guardar estado en el repo
        if: always()
        run: |
          git config user.name "visado-bot"
          git config user.email "bot@noreply"
          git add ultimo_estado.txt || true
          git diff --staged --quiet || git commit -m "chore: actualizar estado [skip ci]"
          git push || true
